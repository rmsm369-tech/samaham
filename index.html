<!DOCTYPE html>
<html>
<head>
    <title>OmniAgent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050510; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; }
        #face { margin-bottom: 20px; }
        #bubble { color: #00ff88; font-size: 14px; max-width: 300px; text-align: center; min-height: 40px; margin-bottom: 20px; opacity: 0; transition: opacity 0.5s; }
        #input-area { display: flex; gap: 10px; }
        input { background: #0a0a2a; color: #00ff88; border: 1px solid #00ff88; padding: 10px 15px; border-radius: 20px; width: 250px; outline: none; }
        button { background: transparent; color: #00ff88; border: 1px solid #00ff88; padding: 10px 15px; border-radius: 20px; cursor: pointer; }
        #pi-display { position: fixed; top: 10px; color: #003322; font-size: 10px; max-width: 100%; overflow: hidden; }
    </style>
</head>
<body>
    <div id="pi-display">π = 3.14159265358979323846...</div>
    <canvas id="face" width="250" height="250"></canvas>
    <div id="bubble">...</div>
    <div id="input-area">
        <input id="msg" placeholder="speak to the entity..." />
        <button onclick="send()">→</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('face'), alpha: true});
        renderer.setSize(250, 250);
        renderer.setClearColor(0x000000, 0);

        const geometry = new THREE.SphereGeometry(1, 16, 16);
        const material = new THREE.MeshBasicMaterial({color: 0x00cc66, wireframe: true, transparent: true, opacity: 0.6});
        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);

        // Clouds
        const cloudGeo = new THREE.SphereGeometry(1.3, 8, 8);
        const cloudMat = new THREE.MeshBasicMaterial({color: 0x004422, wireframe: true, transparent: true, opacity: 0.2});
        const cloud = new THREE.Mesh(cloudGeo, cloudMat);
        scene.add(cloud);

        camera.position.z = 3;

        let thinking = false;

        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.y += thinking ? 0.02 : 0.005;
            sphere.rotation.x += 0.002;
            cloud.rotation.y -= 0.003;
            cloud.rotation.z += 0.001;
            material.opacity = 0.4 + Math.sin(Date.now() * 0.002) * 0.2;
            renderer.render(scene, camera);
        }
        animate();

        async function send() {
    const msg = document.getElementById('msg').value;
    if (!msg) return;
    document.getElementById('msg').value = '';
    thinking = true;
    showBubble('...');
    
    try {
        const { Client } = await import("https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js");
        const client = await Client.connect("nyxtesla/samaham-omniagent");
        const result = await client.predict("/chat", { message: msg });
        showBubble(result.data[0]);
    } catch(e) {
        showBubble('Entity is sleeping...');
    }
    thinking = false;
}

        function showBubble(text) {
            const b = document.getElementById('bubble');
            b.style.opacity = 0;
            setTimeout(() => {
                b.textContent = text;
                b.style.opacity = 1;
            }, 300);
        }

        document.getElementById('msg').addEventListener('keypress', e => {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
